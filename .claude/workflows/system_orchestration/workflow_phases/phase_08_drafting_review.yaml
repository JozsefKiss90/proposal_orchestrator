id: phase_08_drafting_and_review
phase: 8
name: "Drafting and Review"
purpose: >
  Produce evaluator-oriented proposal section drafts for the three criterion-
  aligned sections of the RIA/IA Part B (Excellence, Impact, Implementation);
  assemble into a coherent whole with cross-section consistency checks;
  conduct evaluator-style review against applicable evaluation criteria;
  integrate revisions; produce final export. This phase has six substeps:
  three parallel drafting nodes (a/b/c), followed by sequential assembly (d),
  evaluator review (e), and revision (f).
depends_on:
  - phase_01_call_analysis
  - phase_02_concept_refinement
  - phase_03_wp_design_and_dependency_mapping
  - phase_04_gantt_and_milestones
  - phase_05_impact_architecture
  - phase_06_implementation_architecture
  - phase_07_budget_gate
substeps:

  # =========================================================================
  # Phase 8a — Excellence Section Drafting (parallel with 8b and 8c)
  # =========================================================================
  - id: phase_08a_excellence_drafting
    name: "Excellence Section Drafting"
    purpose: >
      Draft the Excellence section (Section 1) of the RIA/IA Part B proposal,
      covering objectives, relation to work programme, concept and methodology,
      ambition, interdisciplinarity, and gender dimension. Write in evaluator-
      oriented language targeting the Excellence evaluation criterion.
    agent: excellence_writer
    skills:
      - excellence-section-drafting
      - proposal-section-traceability-check
      - constitutional-compliance-check
    required_inputs:
      - path: docs/tier2a_instrument_schemas/application_forms/
        role: "Active application form template — Excellence section structure"
      - path: docs/tier2a_instrument_schemas/evaluation_forms/
        role: "Evaluation form — Excellence criterion scoring logic"
      - path: docs/tier2a_instrument_schemas/extracted/
        role: "Extracted instrument schemas"
      - path: docs/tier3_project_instantiation/
        role: "Project data — objectives, concept, consortium"
      - path: docs/tier4_orchestration_state/phase_outputs/phase1_call_analysis/
        role: "Call analysis and evaluation matrix"
      - path: docs/tier4_orchestration_state/phase_outputs/phase2_concept_refinement/
        role: "Refined concept for Excellence narrative"
      - path: docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/
        role: "WP structure for methodology description"
      - path: docs/tier4_orchestration_state/phase_outputs/phase7_budget_gate/
        role: "Budget gate confirmation — must have passed"
    outputs:
      - path: docs/tier5_deliverables/proposal_sections/excellence_section.json
        content: >
          Excellence section artifact conforming to orch.tier5.excellence_section.v1.
          Includes sub_sections array, validation_status, and traceability_footer.
    instructions:
      - "Verify budget gate has passed before producing content."
      - "Read the Excellence evaluation criterion from evaluation forms before writing."
      - "Draft sub-sections covering objectives, relation to work programme, concept and methodology, ambition, interdisciplinarity, gender dimension."
      - "Write to address evaluator scoring logic, not grant annex reporting requirements."
      - "Every factual claim must be traceable to a named Tier 3 or Tier 4 source."
      - "Do not introduce claims not grounded in Tier 1-4 state."
      - "Do not reference budget figures not validated through the budget gate."
      - "Flag any sub-section that cannot be completed due to missing Tier 3 data."
      - "Append traceability_footer identifying primary source artifacts."
      - "Set validation_status with per-claim classification."

  # =========================================================================
  # Phase 8b — Impact Section Drafting (parallel with 8a and 8c)
  # =========================================================================
  - id: phase_08b_impact_drafting
    name: "Impact Section Drafting"
    purpose: >
      Draft the Impact section (Section 2) of the RIA/IA Part B proposal,
      covering expected impacts and their pathways, measures to maximise impact
      (dissemination, exploitation, communication), and sustainability.
      Map all content to Phase 5 impact architecture.
    agent: impact_writer
    skills:
      - impact-section-drafting
      - proposal-section-traceability-check
      - constitutional-compliance-check
    required_inputs:
      - path: docs/tier2a_instrument_schemas/application_forms/
        role: "Active application form — Impact section structure"
      - path: docs/tier2a_instrument_schemas/evaluation_forms/
        role: "Evaluation form — Impact criterion scoring logic"
      - path: docs/tier2a_instrument_schemas/extracted/
        role: "Extracted instrument schemas"
      - path: docs/tier2b_topic_and_call_sources/extracted/
        role: "Expected outcomes and expected impacts from call"
      - path: docs/tier3_project_instantiation/
        role: "Project data — outcomes, impacts, consortium"
      - path: docs/tier4_orchestration_state/phase_outputs/phase5_impact_architecture/
        role: "Impact architecture with pathways and KPIs"
      - path: docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/
        role: "WP structure for grounding impact claims in project activities"
      - path: docs/tier4_orchestration_state/phase_outputs/phase7_budget_gate/
        role: "Budget gate confirmation — must have passed"
    outputs:
      - path: docs/tier5_deliverables/proposal_sections/impact_section.json
        content: >
          Impact section artifact conforming to orch.tier5.impact_section.v1.
          Includes impact_pathway_refs, dec_coverage, validation_status,
          and traceability_footer.
    instructions:
      - "Verify budget gate has passed before producing content."
      - "Map every expected impact from Tier 2B to a project pathway in the impact architecture."
      - "Ensure dissemination, exploitation, and communication plans are addressed."
      - "Populate impact_pathway_refs with all referenced pathway IDs."
      - "Set dec_coverage fields to true only when genuinely addressed."
      - "Do not fabricate coverage of a call expected impact not addressed by a project output."
      - "Do not assert impact claims without a traceable project mechanism."

  # =========================================================================
  # Phase 8c — Implementation Section Drafting (parallel with 8a and 8b)
  # =========================================================================
  - id: phase_08c_implementation_drafting
    name: "Implementation Section Drafting"
    purpose: >
      Draft the Implementation section (Section 3 — Quality and efficiency)
      of the RIA/IA Part B proposal, covering work plan and WP descriptions,
      Gantt chart, deliverables table, milestones table, management structure,
      risk management, consortium description, and resources allocation.
    agent: implementation_writer
    skills:
      - implementation-section-drafting
      - proposal-section-traceability-check
      - constitutional-compliance-check
    required_inputs:
      - path: docs/tier2a_instrument_schemas/application_forms/
        role: "Active application form — Implementation section structure"
      - path: docs/tier2a_instrument_schemas/evaluation_forms/
        role: "Evaluation form — Quality criterion scoring logic"
      - path: docs/tier2a_instrument_schemas/extracted/
        role: "Extracted instrument schemas"
      - path: docs/tier3_project_instantiation/
        role: "Project data — consortium, roles, risks"
      - path: docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/
        role: "WP structure with tasks, deliverables, dependencies"
      - path: docs/tier4_orchestration_state/phase_outputs/phase4_gantt_milestones/
        role: "Gantt chart and milestone definitions"
      - path: docs/tier4_orchestration_state/phase_outputs/phase6_implementation_architecture/
        role: "Management structure, risk register, governance"
      - path: docs/tier4_orchestration_state/phase_outputs/phase7_budget_gate/
        role: "Budget gate confirmation — must have passed"
    outputs:
      - path: docs/tier5_deliverables/proposal_sections/implementation_section.json
        content: >
          Implementation section artifact conforming to
          orch.tier5.implementation_section.v1. Includes wp_table_refs,
          gantt_ref, milestone_refs, risk_register_ref, validation_status,
          and traceability_footer.
    instructions:
      - "Verify budget gate has passed before producing content."
      - "Populate wp_table_refs with all WP IDs from wp_structure.json."
      - "Set gantt_ref, milestone_refs, risk_register_ref to their source artifacts."
      - "Do not redesign the consortium or WP structure."
      - "Do not assign roles to partners not present in Tier 3."
      - "Do not reference budget figures not validated through the budget gate."

  # =========================================================================
  # Phase 8d — Cross-Section Assembly (depends on 8a + 8b + 8c)
  # =========================================================================
  - id: phase_08d_assembly
    name: "Cross-Section Assembly"
    purpose: >
      Assemble the three criterion-aligned sections into a coherent Part B
      assembled draft. Perform cross-section consistency checks on objectives,
      WP references, partner names, deliverables, milestones, KPIs, impact
      claims, budget/resource claims, and terminology.
    agent: proposal_integrator
    skills:
      - cross-section-consistency-check
      - proposal-section-traceability-check
      - constitutional-compliance-check
    depends_on_substep:
      - phase_08a_excellence_drafting
      - phase_08b_impact_drafting
      - phase_08c_implementation_drafting
    required_inputs:
      - path: docs/tier5_deliverables/proposal_sections/
        role: "Three criterion-aligned section artifacts from Phases 8a/8b/8c"
      - path: docs/tier2a_instrument_schemas/application_forms/
        role: "Section order and assembly requirements"
      - path: docs/tier3_project_instantiation/
        role: "Ground truth for cross-section consistency checks"
    outputs:
      - path: docs/tier5_deliverables/assembled_drafts/part_b_assembled_draft.json
        content: >
          Assembled Part B draft conforming to orch.tier5.part_b_assembled_draft.v1.
          Contains sections array (3 entries in Part B order) and consistency_log
          with cross-section check results.
    instructions:
      - "Assemble sections in Part B order: Excellence (1), Impact (2), Implementation (3)."
      - "Check that all partner names are consistent across sections."
      - "Check that all WP references, task names, and deliverable identifiers are consistent."
      - "Check that all quantitative claims are consistent."
      - "Check that objectives in Excellence match the objectives driving the WP structure in Implementation."
      - "Check that impact claims in Impact are grounded in outputs of WPs in Implementation."
      - "Flag and log any inconsistency in consistency_log; do not silently normalise contradictions."
      - "Do not rewrite section content during assembly; flag inconsistencies only."

  # =========================================================================
  # Phase 8e — Evaluator-Style Review (depends on 8d)
  # =========================================================================
  - id: phase_08e_evaluator_review
    name: "Evaluator-Style Review"
    purpose: >
      Simulate evaluator assessment of the assembled Part B draft against
      applicable evaluation criteria and scoring logic. Produce prioritised
      revision guidance before finalization.
    agent: evaluator_reviewer
    skills:
      - evaluator-criteria-review
      - proposal-section-traceability-check
      - constitutional-compliance-check
    depends_on_substep: phase_08d_assembly
    required_inputs:
      - path: docs/tier5_deliverables/assembled_drafts/part_b_assembled_draft.json
        role: "Assembled Part B proposal draft"
      - path: docs/tier4_orchestration_state/phase_outputs/phase1_call_analysis/
        role: "Evaluation matrix and evaluation criteria with weightings"
      - path: docs/tier2a_instrument_schemas/evaluation_forms/
        role: "Scoring logic and sub-criterion structure"
    outputs:
      - path: docs/tier5_deliverables/review_packets/review_packet.json
        content: >
          Evaluator review report: per-criterion assessment; weaknesses
          categorized by severity (critical/major/minor); cross-cutting issues;
          prioritised revision action list.
      - path: docs/tier4_orchestration_state/phase_outputs/phase8_drafting_review/
        content: "Review report summary and revision action list"
    instructions:
      - "Review each section against the scoring logic of its applicable evaluation criterion."
      - "Assess clarity, credibility, coherence, specificity, and compliance."
      - "Flag: unsupported claims, vague impact language, missing mandatory elements, cross-section inconsistencies."
      - "Categorise each weakness by severity: critical, major, minor."
      - "Provide a prioritised revision action list: critical first, then major, then minor."
      - "Do not revise the draft in this substep; produce the review report only."
      - "Distinguish Confirmed, Inferred, Assumed, and Unresolved elements in the review."

  # =========================================================================
  # Phase 8f — Revision Cycle (depends on 8e)
  # =========================================================================
  - id: phase_08f_revision
    name: "Revision Cycle"
    purpose: >
      Apply revision actions from the evaluator review to the assembled draft.
      Resolve critical and major weaknesses while preserving structural
      consistency. Produce the final revised draft for export.
    agent: revision_integrator
    skills:
      - proposal-section-traceability-check
      - evaluator-criteria-review
      - constitutional-compliance-check
      - decision-log-update
      - checkpoint-publish
    depends_on_substep: phase_08e_evaluator_review
    required_inputs:
      - path: docs/tier5_deliverables/assembled_drafts/part_b_assembled_draft.json
        role: "Assembled Part B draft to be revised"
      - path: docs/tier5_deliverables/review_packets/review_packet.json
        role: "Review report with prioritised revision actions"
      - path: docs/tier4_orchestration_state/phase_outputs/phase7_budget_gate/
        role: "Budget gate confirmation to prevent budget-contradicting revisions"
    outputs:
      - path: docs/tier5_deliverables/assembled_drafts/part_b_assembled_draft.json
        content: "Revised Part B proposal draft incorporating all critical and major revision actions"
      - path: docs/tier5_deliverables/final_exports/final_export.json
        content: "Final export of the revised proposal ready for submission formatting"
      - path: docs/tier4_orchestration_state/phase_outputs/phase8_drafting_review/drafting_review_status.json
        content: "Revision log: which actions were applied, how, and any residual minor issues"
      - path: docs/tier4_orchestration_state/checkpoints/phase8_checkpoint.json
        content: "Phase 8 checkpoint confirming workflow completion and final state"
    instructions:
      - "Apply critical revision actions first."
      - "Apply major revision actions second."
      - "For each revision, ensure the change does not create a new inconsistency with other sections."
      - "Do not introduce content that contradicts the validated budget or Tier 3 project facts."
      - "Do not resolve a gap by fabricating content; flag unresolvable gaps in the revision log."
      - "After critical and major revisions, produce a revision log confirming what was changed."
      - "Publish the Phase 8 checkpoint to Tier 4 checkpoints/."
      - "Write the final export to Tier 5 final_exports/."

gate_condition:
  all_of:
    - "Budget gate must have passed (prerequisite for all Phase 8 substeps)"
    - "Excellence section drafted with traceability and no unresolved claims (gate_10a)"
    - "Impact section drafted with pathway coverage and DEC measures (gate_10b)"
    - "Implementation section drafted with WP/Gantt/milestone/risk coverage (gate_10c)"
    - "Part B assembled with cross-section consistency verified (gate_10d)"
    - "Review packet present with severity-categorised findings (gate_11)"
    - "All critical revision actions resolved or logged as unresolvable with reason"
    - "Final export present in final_exports/"
    - "Phase 8 checkpoint published to Tier 4 checkpoints/"
    - "No section contains content contradicted by a higher tier"
    - "Budget gate confirmation present and no section contradicts the validated budget"
  fail_behavior: >
    Declare gate failure. Write unresolved critical issues and missing sections
    to phase8_drafting_review/. Do not mark proposal as complete. Surface to
    human operator.
