    name: "Budget Gate"
    source_file: workflow_phases/phase_07_budget_gate.yaml
    agent: budget_gate_validator
    pre_gate_agent: budget_interface_coordinator
    skills:
      - budget-interface-validation
      - gate-enforcement
      - decision-log-update
      - constitutional-compliance-check
    exit_gate: gate_09_budget_consistency
    mandatory: true
    bypass_prohibited: true
    absent_artifacts_behavior: blocking_gate_failure
    terminal: false

  - node_id: n08a_excellence_drafting
    phase_id: phase_08a_excellence_drafting
    phase_number: 8
    substep: a
    name: "Excellence Section Drafting"
    source_file: workflow_phases/phase_08_drafting_review.yaml
    agent: excellence_writer
    skills:
      - excellence-section-drafting
      - proposal-section-traceability-check
      - constitutional-compliance-check
    exit_gate: gate_10a_excellence_completeness
