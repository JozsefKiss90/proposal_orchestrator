name: system_orchestration
version: "1.1"
compiled_from: .claude/workflows/system_orchestration/
constitutional_authority: CLAUDE.md

# ============================================================
# EXECUTION MODEL
# ============================================================

execution_model:
  type: DAG
  evaluation_strategy: gate-first
  fail_mode: blocking
  gate_semantics: >
    All gates are blocking. A gate failure halts the downstream subgraph.
    Fabricated completion is a constitutional violation. Declared failure
    is a valid and correct output.
  budget_gate_semantics: >
    Phase 7 is a mandatory, bypass-prohibited gate. Absent budget artifacts
    always produce a blocking gate failure. There is no non-failing hold state.
  phase_ordering: strict
  allow_phase_skip: false
  allow_gate_bypass: false
  rerun_policy: deterministic_from_documented_inputs

# ============================================================
# NODE REGISTRY
# Each node = one canonical phase (or substep for Phase 8)
# ============================================================

node_registry:

  - node_id: n01_call_analysis
    phase_id: phase_01_call_analysis
    phase_number: 1
    name: "Call Analysis"
    source_file: workflow_phases/phase_01_call_analysis.yaml
    agent: call_analyzer
    skills:
      - call-requirements-extraction
      - evaluation-matrix-builder
      - instrument-schema-normalization
      - topic-scope-check
    entry_gate: gate_01_source_integrity
    exit_gate: phase_01_gate
    terminal: false

  - node_id: n02_concept_refinement
    phase_id: phase_02_concept_refinement
    phase_number: 2
    name: "Concept Refinement"
    source_file: workflow_phases/phase_02_concept_refinement.yaml
    agent: concept_refiner
    skills:
      - concept-alignment-check
      - concept-call-binding-derivation
      - topic-scope-check
      - proposal-section-traceability-check
      - decision-log-update
    exit_gate: phase_02_gate
    terminal: false

  - node_id: n03_wp_design
    phase_id: phase_03_wp_design_and_dependency_mapping
    phase_number: 3
    name: "Work Package Design and Dependency Mapping"
    source_file: workflow_phases/phase_03_wp_design.yaml
    agent: wp_designer
    sub_agent: dependency_mapper
    skills:
      - work-package-normalization
      - wp-dependency-analysis
      - milestone-consistency-check
      - instrument-schema-normalization
      - gate-enforcement
    exit_gate: phase_03_gate
    terminal: false

  - node_id: n04_gantt_milestones
    phase_id: phase_04_gantt_and_milestones
    phase_number: 4
    name: "Gantt and Milestones"
    source_file: workflow_phases/phase_04_gantt_milestones.yaml
    agent: gantt_designer
    skills:
      - gantt-schedule-builder
      - milestone-consistency-check
      - gate-enforcement
      - decision-log-update
    exit_gate: phase_04_gate
    terminal: false

  - node_id: n05_impact_architecture
    phase_id: phase_05_impact_architecture
    phase_number: 5
    name: "Impact Architecture"
    source_file: workflow_phases/phase_05_impact_architecture.yaml
