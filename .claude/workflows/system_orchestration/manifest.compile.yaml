  - node_id: n08f_revision
    phase_id: phase_08f_revision
    phase_number: 8
    substep: f
    name: "Revision Cycle"
    source_file: workflow_phases/phase_08_drafting_review.yaml
    agent: revision_integrator
    skills:
      - proposal-section-traceability-check
      - evaluator-criteria-review
      - constitutional-compliance-check
      - decision-log-update
      - checkpoint-publish
    exit_gate: gate_12_constitutional_compliance
    terminal: true

# ============================================================
# EDGE REGISTRY
# Directed edges defining the DAG execution order.
# An edge is traversable only when the source node's exit gate has passed.
# ============================================================

edge_registry:

  - edge_id: e01_to_02
    from_node: n01_call_analysis
    to_node: n02_concept_refinement
    gate_condition: phase_01_gate
    description: "Phase 1 gate must pass before concept refinement begins"

  - edge_id: e02_to_03
    from_node: n02_concept_refinement
    to_node: n03_wp_design
    gate_condition: phase_02_gate
    description: "Phase 2 gate must pass before WP design begins"

  - edge_id: e02_to_05
    from_node: n02_concept_refinement
    to_node: n05_impact_architecture
    gate_condition: phase_02_gate
    description: "Phase 5 may proceed after Phase 2 gate, provided Phase 3 gate also passes"
    additional_condition: phase_03_gate
    description_full: "Phase 5 requires both Phase 2 and Phase 3 gates to have passed"

  - edge_id: e03_to_04
    from_node: n03_wp_design
    to_node: n04_gantt_milestones
    gate_condition: phase_03_gate
    description: "Phase 3 gate must pass before Gantt design begins"

  - edge_id: e03_to_05
    from_node: n03_wp_design
    to_node: n05_impact_architecture
    gate_condition: phase_03_gate
    description: "Phase 3 gate is a prerequisite for Phase 5"

  - edge_id: e03_to_06
    from_node: n03_wp_design
    to_node: n06_implementation_architecture
    gate_condition: phase_03_gate
    description: "Phase 3 gate is a prerequisite for Phase 6"

  - edge_id: e04_to_06
    from_node: n04_gantt_milestones
    to_node: n06_implementation_architecture
    gate_condition: phase_04_gate
    description: "Phase 4 gate must pass before implementation architecture begins"

  - edge_id: e05_to_06
    from_node: n05_impact_architecture
    to_node: n06_implementation_architecture
    gate_condition: phase_05_gate
    description: "Phase 5 gate must pass before implementation architecture begins"

  - edge_id: e06_to_07
    from_node: n06_implementation_architecture
    to_node: n07_budget_gate
    gate_condition: phase_06_gate
    description: "Phase 6 gate must pass before budget gate evaluation"

  # Budget gate fans out to three parallel drafting nodes
  - edge_id: e07_to_08a
    from_node: n07_budget_gate
    to_node: n08a_excellence_drafting
    gate_condition: gate_09_budget_consistency
    mandatory_gate: true
    bypass_prohibited: true
    description: "Budget gate must pass before Excellence drafting"

  - edge_id: e07_to_08b
    from_node: n07_budget_gate
    to_node: n08b_impact_drafting
    gate_condition: gate_09_budget_consistency
    mandatory_gate: true
    bypass_prohibited: true
    description: "Budget gate must pass before Impact drafting"

  - edge_id: e07_to_08c
    from_node: n07_budget_gate
    to_node: n08c_implementation_drafting
    gate_condition: gate_09_budget_consistency
    mandatory_gate: true
    bypass_prohibited: true
    description: "Budget gate must pass before Implementation drafting"

  # Three section gates converge on assembly
  - edge_id: e08a_to_08d
    from_node: n08a_excellence_drafting
    to_node: n08d_assembly
    gate_condition: gate_10a_excellence_completeness
    description: "Excellence section must be complete before assembly"

  - edge_id: e08b_to_08d
    from_node: n08b_impact_drafting
    to_node: n08d_assembly
    gate_condition: gate_10b_impact_completeness
    description: "Impact section must be complete before assembly"

  - edge_id: e08c_to_08d
    from_node: n08c_implementation_drafting
    to_node: n08d_assembly
    gate_condition: gate_10c_implementation_completeness
    description: "Implementation section must be complete before assembly"

  # Assembly -> Review -> Revision (sequential)
  - edge_id: e08d_to_08e
    from_node: n08d_assembly
    to_node: n08e_evaluator_review
    gate_condition: gate_10d_cross_section_consistency
    description: "Assembly must pass consistency check before review"

  - edge_id: e08e_to_08f
    from_node: n08e_evaluator_review
    to_node: n08f_revision
    gate_condition: gate_11_review_closure
    description: "Review must complete before revision cycle"

# ============================================================
# GATE REGISTRY
# All quality gates with their evaluation points and actions.
# ============================================================

gate_registry:

  - gate_id: gate_01_source_integrity
    name: "Source Integrity"
    source_file: quality_gates.yaml
    evaluated_at: n01_call_analysis entry
    blocking_nodes:
      - n01_call_analysis
    fail_action: "Halt workflow; report missing sources to human operator"
    bypass_prohibited: false
    conditions:
      - prose: "selected_call.json must be present and non-empty"
        predicate_refs: [g01_p01, g01_p02]
      - prose: "At least one work programme document must be present"
        predicate_refs: [g01_p03]
      - prose: "At least one call extract matching the topic code must be present"
        predicate_refs: [g01_p04]
      - prose: "An application form template for the resolved instrument type must be present"
        predicate_refs: [g01_p05]
      - prose: "An evaluation form for the resolved instrument type must be present"
        predicate_refs: [g01_p06]

  - gate_id: phase_01_gate
    name: "Phase 1 Gate"
    evaluated_at: n01_call_analysis exit
    conditions:
      - prose: "All six Tier 2B extracted JSON files are non-empty with source section references"
        predicate_refs: [g02_p01, g02_p02, g02_p03, g02_p04, g02_p05, g02_p06,
                         g02_p07, g02_p08, g02_p09, g02_p10, g02_p11, g02_p12]
      - prose: "selected_call.json is confirmed populated and consistent with Tier 2B source"
        predicate_refs: [g02_p13]
      - prose: "Instrument type resolved to a Tier 2A application form and evaluation form"
        predicate_refs: [g02_p14, g02_p15]
      - prose: "Evaluation matrix and compliance checklist written to Tier 4 phase output"
        predicate_refs: [g02_p16, g02_p17]
    blocking_edges:
      - e01_to_02
    fail_action: "Declare gate failure; write report to phase1_call_analysis/; do not proceed to Phase 2"
    bypass_prohibited: false

  - gate_id: phase_02_gate
    name: "Phase 2 Gate"
    evaluated_at: n02_concept_refinement exit
    conditions:
      - prose: "Phase 1 gate must have passed"
        predicate_refs: [g03_p01]
      - prose: "topic_mapping.json is non-empty and all mappings carry source references"
        predicate_refs: [g03_p02, g03_p03]
      - prose: "compliance_profile.json is non-empty"
        predicate_refs: [g03_p04]
      - prose: "Phase 2 summary written to Tier 4"
        predicate_refs: [g03_p05, g03_p07]
      - prose: "No unresolved scope conflicts between concept and Tier 2B"
        predicate_refs: [g03_p06]
    blocking_edges:
      - e02_to_03
      - e02_to_05
    fail_action: "Declare gate failure; write report to phase2_concept_refinement/; do not proceed to Phase 3"
    bypass_prohibited: false

  - gate_id: phase_03_gate
    name: "Phase 3 Gate"
    evaluated_at: n03_wp_design exit
    conditions:
      - prose: "Phase 2 gate must have passed"
        predicate_refs: [g04_p01]
      - prose: "Full WP structure written to Tier 4"
        predicate_refs: [g04_p02, g04_p02b]
      - prose: "Dependency map written to Tier 4"
        predicate_refs: [g04_p03]
      - prose: "All WPs have at least one deliverable and a responsible lead"
        predicate_refs: [g04_p04]
      - prose: "WP count compliant with Tier 2A instrument constraints"
        predicate_refs: [g04_p05]
      - prose: "No dependency cycles in the dependency map"
        predicate_refs: [g04_p06]
      - prose: "All assigned partners present in Tier 3 consortium data"
        predicate_refs: [g04_p07]
    blocking_edges:
      - e03_to_04
      - e03_to_05
      - e03_to_06
    fail_action: "Declare gate failure; write gap report to phase3_wp_design/; do not proceed to Phase 4 or Phase 5"
    bypass_prohibited: false

  - gate_id: phase_04_gate
    name: "Phase 4 Gate"
    evaluated_at: n04_gantt_milestones exit
    conditions:
      - prose: "Phase 3 gate must have passed"
        predicate_refs: [g05_p01]
      - prose: "Gantt structure and milestone table written to Tier 4"
        predicate_refs: [g05_p02, g05_p02b]
      - prose: "All tasks assigned to months within project duration"
        predicate_refs: [g05_p03, g05_p04]
      - prose: "All milestones have verifiable criteria and due months"
        predicate_refs: [g05_p05]
      - prose: "Critical path identified and consistent with dependency map"
        predicate_refs: [g05_p06]
      - prose: "milestones_seed.json populated in Tier 3"
        predicate_refs: [g05_p07]
      - prose: "Normalized scheduling constraints written to Tier 4"
        predicate_refs: [g05_p02c, g05_p02d]
      - prose: "Schedule respects all strict dependency constraints from normalized dependency map"
        predicate_refs: [g05_p08]
    blocking_edges:
      - e04_to_06
    fail_action: "Declare gate failure; write scheduling conflicts to phase4_gantt_milestones/; do not proceed to Phase 6"
    bypass_prohibited: false

  - gate_id: phase_05_gate
    name: "Phase 5 Gate"
    evaluated_at: n05_impact_architecture exit
    conditions:
      - prose: "Phase 2 gate must have passed"
        predicate_refs: [g06_p01]
      - prose: "Phase 3 gate must have passed"
        predicate_refs: [g06_p02]
      - prose: "Full impact architecture written to Tier 4"
        predicate_refs: [g06_p03, g06_p03b]
      - prose: "All call expected impacts have at least one mapped project output"
        predicate_refs: [g06_p04]
      - prose: "KPI set is defined and traceable to WP deliverables"
        predicate_refs: [g06_p05]
      - prose: "Dissemination and exploitation logic is defined"
        predicate_refs: [g06_p06, g06_p07]
      - prose: "Sustainability mechanism is defined"
        predicate_refs: [g06_p08]
    blocking_edges:
      - e05_to_06
    fail_action: "Declare gate failure; write unmapped impacts to phase5_impact_architecture/; do not proceed to Phase 8"
    bypass_prohibited: false

  - gate_id: phase_06_gate
    name: "Phase 6 Gate"
    evaluated_at: n06_implementation_architecture exit
    conditions:
      - prose: "Phase 3 gate must have passed"
        predicate_refs: [g07_p01]
      - prose: "Phase 4 gate must have passed"
        predicate_refs: [g07_p02]
      - prose: "Phase 5 gate must have passed"
        predicate_refs: [g07_p03]
      - prose: "Implementation architecture written to Tier 4"
        predicate_refs: [g07_p04, g07_p04b]
      - prose: "Risk register is populated"
        predicate_refs: [g07_p05]
      - prose: "Ethics self-assessment is explicitly present (not omitted)"
        predicate_refs: [g07_p06]
      - prose: "Governance matrix is defined"
        predicate_refs: [g07_p07]
      - prose: "All management roles assigned to Tier 3 consortium members"
        predicate_refs: [g07_p08]
      - prose: "All instrument-mandated implementation sections addressed per Tier 2A schema"
        predicate_refs: [g07_p09]
    blocking_edges:
      - e06_to_07
    fail_action: "Declare gate failure; write omitted sections to phase6_implementation_architecture/; do not proceed to Phase 7"
    bypass_prohibited: false

  - gate_id: gate_09_budget_consistency
    name: "Budget Consistency (Phase 7 Gate)"
    evaluated_at: n07_budget_gate exit
    mandatory: true
    bypass_prohibited: true
    absent_artifacts_behavior: blocking_gate_failure
    conditions:
      - prose: "Phase 6 gate must have passed"
        predicate_refs: [g08_p01]
      - prose: "Non-empty budget response artifact present in integrations/received/"
        predicate_refs: [g08_p02]
      - prose: "Validation artifact present in integrations/validation/"
        predicate_refs: [g08_p03]
      - prose: "Interface contract conformance confirmed"
        predicate_refs: [g08_p04]
      - prose: "All Phase 3 WPs have corresponding budget entries"
        predicate_refs: [g08_p05]
      - prose: "All consortium partners have corresponding budget allocations"
        predicate_refs: [g08_p06]
      - prose: "No blocking inconsistency logged without resolution"
        predicate_refs: [g08_p07]
      - prose: "Budget gate assessment written to Tier 4"
        predicate_refs: [g08_p08, g08_p09]
    blocking_edges:
      - e07_to_08a
    fail_action: >
      Declare gate failure. Write blocking inconsistencies and missing artifacts to
      phase7_budget_gate/. Block Phase 8 entirely. Surface to human operator.
      Absent budget artifacts are not a hold state; they are a gate failure.

  - gate_id: gate_10a_excellence_completeness
    name: "Excellence Section Completeness"
    evaluated_at: n08a_excellence_drafting exit
    conditions:
      - prose: "Budget gate must have passed"
        predicate_refs: [g09a_p01]
      - prose: "Excellence section artifact exists, owned, schema-valid"
        predicate_refs: [g09a_p02, g09a_p03, g09a_p04]
      - prose: "Traceability footer and validation status exist"
        predicate_refs: [g09a_p05, g09a_p05b]
      - prose: "No unresolved material claims"
        predicate_refs: [g09a_p06]
    blocking_edges:
      - e08a_to_08d
    fail_action: "Block assembly; report Excellence section gaps"
    bypass_prohibited: false

  - gate_id: gate_10b_impact_completeness
    name: "Impact Section Completeness"
    evaluated_at: n08b_impact_drafting exit
    conditions:
      - prose: "Budget gate must have passed"
        predicate_refs: [g09b_p01]
      - prose: "Impact section artifact exists, owned, schema-valid"
        predicate_refs: [g09b_p02, g09b_p03, g09b_p04]
      - prose: "Traceability footer and validation status exist"
        predicate_refs: [g09b_p05, g09b_p05b]
      - prose: "Impact pathways and DEC measures covered"
        predicate_refs: [g09b_p06]
      - prose: "No unresolved material claims"
        predicate_refs: [g09b_p07]
    blocking_edges:
      - e08b_to_08d
    fail_action: "Block assembly; report Impact section gaps"
    bypass_prohibited: false

  - gate_id: gate_10c_implementation_completeness
    name: "Implementation Section Completeness"
    evaluated_at: n08c_implementation_drafting exit
    conditions:
      - prose: "Budget gate must have passed"
        predicate_refs: [g09c_p01]
      - prose: "Implementation section artifact exists, owned, schema-valid"
        predicate_refs: [g09c_p02, g09c_p03, g09c_p04]
      - prose: "Traceability footer and validation status exist"
        predicate_refs: [g09c_p05, g09c_p05b]
      - prose: "WP, Gantt, milestone, risk register coverage complete"
        predicate_refs: [g09c_p06]
      - prose: "No unresolved material claims"
        predicate_refs: [g09c_p07]
    blocking_edges:
      - e08c_to_08d
    fail_action: "Block assembly; report Implementation section gaps"
    bypass_prohibited: false

  - gate_id: gate_10d_cross_section_consistency
    name: "Cross-Section Consistency"
    evaluated_at: n08d_assembly exit
    conditions:
      - prose: "All three criterion gates must have passed"
        predicate_refs: [g09d_p01, g09d_p02, g09d_p03]
      - prose: "Assembled Part B draft exists and is owned"
        predicate_refs: [g09d_p04, g09d_p05]
      - prose: "Schema ID matches"
        predicate_refs: [g09d_p06]
      - prose: "Cross-section consistency verified"
        predicate_refs: [g09d_p07]
    blocking_edges:
      - e08d_to_08e
    fail_action: "Block evaluator review; report cross-section inconsistencies"
    bypass_prohibited: false

  - gate_id: gate_11_review_closure
    name: "Review Closure"
    evaluated_at: n08e_evaluator_review exit
    conditions:
      - prose: "gate_10d must have passed"
        predicate_refs: [g10_p01]
      - prose: "Review packet present in review_packets/"
        predicate_refs: [g10_p02, g10_p02b]
      - prose: "All critical findings categorised by severity"
        predicate_refs: [g10_p03]
      - prose: "Prioritised revision action list produced"
        predicate_refs: [g10_p04]
    blocking_edges:
      - e08e_to_08f
    fail_action: "Block revision cycle; report incomplete review"
    bypass_prohibited: false

  - gate_id: gate_12_constitutional_compliance
    name: "Constitutional Compliance"
    evaluated_at: n08f_revision exit
    conditions:
      - prose: "gate_11 must have passed"
        predicate_refs: [g11_p01]
      - prose: "All sections required by active application form present"
        predicate_refs: [g11_p02]
      - prose: "Review packet present"
        predicate_refs: [g11_p03]
      - prose: "All critical revision actions resolved or logged as unresolvable with reason"
        predicate_refs: [g11_p04]
      - prose: "Final export present in final_exports/"
        predicate_refs: [g11_p05, g11_p05b]
      - prose: "Phase 8 checkpoint published"
        predicate_refs: [g11_p06]
      - prose: "Budget gate confirmation present and no section contradicts the validated budget"
        predicate_refs: [g11_p07, g11_p10]
      - prose: "No section contains content contradicted by a higher tier"
        predicate_refs: [g11_p08]
      - prose: "No constitutional prohibitions from CLAUDE.md Section 13 are violated"
        predicate_refs: [g11_p09, g11_p11, g11_p12, g11_p13]
    blocking_edges: []
    fail_action: "Block final export; log constitutional violation; surface to human operator"
    bypass_prohibited: false

