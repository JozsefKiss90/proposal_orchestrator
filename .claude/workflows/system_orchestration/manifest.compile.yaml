  - node_id: n08c_implementation_drafting
    phase_id: phase_08c_implementation_drafting
    phase_number: 8
    substep: c
    name: "Implementation Section Drafting"
    source_file: workflow_phases/phase_08_drafting_review.yaml
    agent: implementation_writer
    skills:
