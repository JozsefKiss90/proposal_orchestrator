      - gate-enforcement
    exit_gate: phase_05_gate
    terminal: false

  - node_id: n06_implementation_architecture
    phase_id: phase_06_implementation_architecture
    phase_number: 6
    name: "Implementation Architecture"
    source_file: workflow_phases/phase_06_implementation_architecture.yaml
    agent: implementation_architect
    skills:
      - governance-model-builder
      - risk-register-builder
      - milestone-consistency-check
      - constitutional-compliance-check
      - gate-enforcement
    exit_gate: phase_06_gate
    terminal: false

  - node_id: n07_budget_gate
