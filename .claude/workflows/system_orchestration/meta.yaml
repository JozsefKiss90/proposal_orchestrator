name: system_orchestration
description: >
  Authoritative orchestration specification for the Horizon Europe Proposal
  Orchestration System. This workflow is universal and programme-agnostic by
  default. It becomes call-specific through Tier 2B population and project-specific
  through Tier 3 population. It operationalises the repository constitution
  defined in CLAUDE.md and must not be interpreted or executed in a manner
  that conflicts with it. This file governs the intended system including agents
  and skills not yet fully implemented; it is a specification, not an implementation
  mirror.

version: "1.1"
package_model: true
package_version: "1.1"

constitutional_authority:
  document: CLAUDE.md
  location: ./CLAUDE.md
  status: >
    This workflow is subordinate to CLAUDE.md. Where any provision of this
    workflow conflicts with CLAUDE.md, CLAUDE.md governs without exception.
    This workflow operationalises the constitution; it does not reinterpret,
    weaken, or supersede it.
  authority_hierarchy_position: 8
  amendment_rule: >
    This workflow may be amended only by explicit human instruction. Any
    amendment that changes phase definitions, gate conditions, agent scopes,
    or integration rules must be preceded by a review of CLAUDE.md for
    constitutional alignment. Constitutional conflicts discovered after
    writing must be logged and resolved in the next revision cycle.

repository_scope:
  system_type: "Universal Horizon Europe proposal orchestration engine"
  programme_specificity: "Programme-agnostic by default; governed by Tier 1 normative framework"
  instrument_coverage:
    - RIA
    - IA
    - CSA
    - MSCA-DN
    - MSCA-PF
    - MSCA-SE
    - MSCA-COFUND
    - COFUND
    - ERC-StG
    - ERC-CoG
    - ERC-AdG
    - ERC-SyG
    - ERC-PoC
    - EIC
  call_specificity: "Acquired through Tier 2B population only"
  project_specificity: "Acquired through Tier 3 population only"
  optimisation_target: >
    Evaluation success under applicable Horizon Europe evaluation criteria.
    Not grant-preparation formatting, grant agreement annex compliance, or
    financial reporting readiness. Proposal writing serves the evaluator,
    not the grant officer.
  project_assumptions_default: >
    None. No project facts may be assumed in the absence of Tier 3 population.

# ============================================================
# PACKAGE MANIFEST
# Source files composing this package (load order for runners)
# ============================================================

package_sources:
  - file: global_rules.yaml
    key: global_rules
    load_order: 1

  - file: tier_bindings.yaml
    key: tier_bindings
    load_order: 2

  - file: workflow_phases/phase_01_call_analysis.yaml
    key: workflow[0]
    load_order: 3

  - file: workflow_phases/phase_02_concept_refinement.yaml
    key: workflow[1]
    load_order: 4

  - file: workflow_phases/phase_03_wp_design.yaml
    key: workflow[2]
    load_order: 5

  - file: workflow_phases/phase_04_gantt_milestones.yaml
    key: workflow[3]
    load_order: 6

  - file: workflow_phases/phase_05_impact_architecture.yaml
    key: workflow[4]
    load_order: 7

  - file: workflow_phases/phase_06_implementation_architecture.yaml
    key: workflow[5]
    load_order: 8

  - file: workflow_phases/phase_07_budget_gate.yaml
    key: workflow[6]
    load_order: 9

  - file: workflow_phases/phase_08_drafting_review.yaml
    key: workflow[7]
    load_order: 10

  - file: quality_gates.yaml
    key: quality_gates
    load_order: 11

  - file: agent_catalog.yaml
    key: agent_catalog
    load_order: 12

  - file: skill_catalog.yaml
    key: skill_catalog
    load_order: 13

  - file: state_rules.yaml
    key: state_rules
    load_order: 14

  - file: integration_rules.yaml
    key: integration_rules
    load_order: 15

  - file: design_notes.yaml
    key: design_notes
    load_order: 16

compiled_entry: manifest.compile.yaml
