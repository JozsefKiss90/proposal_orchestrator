state_rules:

  tier4_durability:
    rule: >
      All durable outputs from canonical phases must be written to
      docs/tier4_orchestration_state/phase_outputs/ before downstream phases
      depend on them. In-memory outputs do not satisfy gate conditions or phase
      completion requirements.
    enforcement: gate-enforcement skill at every phase exit

  checkpoint_preservation:
    rule: >
      Checkpoints written to docs/tier4_orchestration_state/checkpoints/ after a
      gate has been formally validated must not be overwritten. If a phase is rerun
      after a checkpoint has been published, the rerun must produce a new checkpoint
      artifact; it must not modify the prior validated artifact.
    enforcement: checkpoint-publish skill

  decision_logging:
    rule: >
      Every material interpretation decision, tier conflict resolution, gap
      declaration, and gate failure must be written to
      docs/tier4_orchestration_state/decision_log/. Decisions held only in agent
      memory are not durable and do not govern future interpretation.
    enforcement: decision-log-update skill; mandatory for all agents at decision points

  rerun_behavior:
    rule: >
      When a phase is rerun, it must deterministically update Tier 4 state from its
      documented inputs. It must not rely on in-memory state from a prior run. If
      inputs have changed since the prior run, the phase must re-execute fully and
      write updated artifacts. If inputs are unchanged, the phase may confirm prior
      artifacts without re-executing.

  conflict_logging:
    rule: >
      When a conflict between tiers cannot be resolved by the authority hierarchy,
      it must be logged as Unresolved in the decision log and surfaced to the human
      operator. It must not be silently resolved by selecting the more convenient source.

  agent_memory_boundary:
    rule: >
      .claude/agent-memory/ is an operational aid. Its contents do not constitute
      constitutional source truth. When a conflict exists between agent memory and
      documented Tier 3 or Tier 4 state, documented state governs. Agents must read
      current Tier 3 and Tier 4 artifacts, not rely on memory of prior states.
    corollary: >
      .claude/cache/, .claude/logs/, and .claude/runs/ are runtime state directories.
      They may be rebuilt or cleared without affecting the constitutional validity of
      docs/ state.

  validation_status_vocabulary:
    rule: >
      All validation reports and phase output assessments must categorize each
      evaluated element using exactly the following status values:
        Confirmed: directly evidenced by a named source in Tier 1-3
        Inferred: derived by logical reasoning from confirmed evidence; inference chain stated
        Assumed: adopted in the absence of direct evidence; assumption explicitly declared
        Unresolved: conflicting evidence or missing information; resolution required before downstream use
    enforcement: traceability-auditor skill; mandatory in all validation_reports/

  index_maintenance:
    rule: >
      The docs/index/ registries must be maintained to reflect current repository
      state. Additions of new source documents, updated extracted files, or new
      project instantiation artifacts must be reflected in the relevant registry.
