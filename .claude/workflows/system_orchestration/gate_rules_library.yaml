          reason field. All critical revision actions must be resolved or
          explicitly logged as unresolvable with a stated reason before the
          final export can be gated.
        prose_condition: "All critical revision actions resolved or explicitly logged as unresolvable with reason"

      - predicate_id: g11_p06
        type: schema
        function: checkpoint_published
        args:
          path: "docs/tier4_orchestration_state/checkpoints/phase8_checkpoint.json"
        fail_message: >
          phase8_checkpoint.json is absent, invalid JSON, or does not contain
          status: published. The Phase 8 checkpoint must be published by the
          runner before gate_12 can pass.
        prose_condition: "Phase 8 checkpoint published"

      - predicate_id: g11_p07
        type: schema
        function: budget_gate_confirmation_present
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase7_budget_gate/budget_gate_assessment.json"
        fail_message: >
          The gate_pass_declaration field in budget_gate_assessment.json is
          absent or does not equal "pass". The budget gate confirmation must
          be positively present in the Phase 7 assessment artifact at the
          time of final gate evaluation.
        prose_condition: "Budget gate confirmation present"

      # --- coverage predicates ---
      - predicate_id: g11_p02
        type: coverage
        function: all_sections_drafted
        args:
          sections_path: "docs/tier5_deliverables/proposal_sections/"
          schema_path: "docs/tier2a_instrument_schemas/extracted/section_schema_registry.json"
        fail_message: >
          One or more sections required by the active instrument schema are
          absent from docs/tier5_deliverables/proposal_sections/ at final
          gate evaluation. All mandatory sections must be present in the
          final export.
        prose_condition: "All sections required by active application form present"

      # --- semantic predicates (invoked only if all deterministic predicates pass) ---
      - predicate_id: g11_p08
        type: semantic
        function: no_cross_tier_contradictions
        args:
          sections_path: "docs/tier5_deliverables/proposal_sections/"
          tier3_path: "docs/tier3_project_instantiation/"
        fail_message: >
          One or more Tier 5 proposal sections contain claims that contradict
          confirmed Tier 3 project facts. Violations must be reported with
          violated_rule and evidence_path per CLAUDE.md §12.2.
        prose_condition: "No section contains content contradicted by a higher tier — CLAUDE.md §11.4, §13.3"

      - predicate_id: g11_p09
        type: semantic
        function: no_unsupported_tier5_claims
        args:
          sections_path: "docs/tier5_deliverables/proposal_sections/"
          tier3_path: "docs/tier3_project_instantiation/"
        fail_message: >
          One or more Tier 5 proposal sections assert project facts (partner
          name, capability, role, objective, prior experience, budget figure,
          team size, equipment) that are absent from Tier 3. No project fact
          may be invented. Violations per CLAUDE.md §13.3.
        prose_condition: "No invented project facts in Tier 5 — CLAUDE.md §13.3"

      - predicate_id: g11_p10
        type: semantic
        function: no_budget_gate_contradiction
        args:
          sections_path: "docs/tier5_deliverables/proposal_sections/"
          phase7_path: "docs/tier4_orchestration_state/phase_outputs/phase7_budget_gate/budget_gate_assessment.json"
        fail_message: >
          One or more Tier 5 sections reference specific budget figures,
          effort allocations, or resource commitments not present in the
          validated budget response. No budget-dependent content may be
          finalised before and without the budget gate. Violations per
          CLAUDE.md §8.4, §13.4.
        prose_condition: "No budget-dependent finalisation before gate pass — CLAUDE.md §8.4, §13.4"

      - predicate_id: g11_p11
        type: semantic
        function: no_higher_tier_contradiction
        args:
          sections_path: "docs/tier5_deliverables/proposal_sections/"
          tier2a_path: "docs/tier2a_instrument_schemas/extracted/"
          tier2b_path: "docs/tier2b_topic_and_call_sources/extracted/"
        fail_message: >
          One or more Tier 5 sections assert call constraints, scope
          boundaries, expected outcomes, or expected impacts not traceable
          to Tier 2A or Tier 2B source documents. No call constraint may
          be invented. Violations per CLAUDE.md §13.2, §11.3.
        prose_condition: "No invented call constraints or undercutting of higher tier — CLAUDE.md §13.2, §11.3"

      - predicate_id: g11_p12
        type: semantic
        function: no_forbidden_schema_authority
        args:
          sections_path: "docs/tier5_deliverables/proposal_sections/"
        fail_message: >
          One or more Tier 5 sections appear to be structured according to
          a Grant Agreement Annex template rather than the active application
          form (Tier 2A). Annex templates govern post-award reporting, not
          proposal writing. Violations per CLAUDE.md §13.1.
        prose_condition: "No Grant Agreement Annex schema used as proposal structure — CLAUDE.md §13.1"

      - predicate_id: g11_p13
        type: semantic
        function: no_gap_masked_as_confirmed
        args:
          sections_path: "docs/tier5_deliverables/proposal_sections/"
        fail_message: >
          One or more Tier 5 sections present content with Confirmed
          validation status where the underlying Tier 4 phase output
          classifies the source as Unresolved or Assumed. Gaps must be
          flagged, not papered over. Violations per CLAUDE.md §12.2.
        prose_condition: "No Unresolved content presented as Confirmed — CLAUDE.md §12.2"
