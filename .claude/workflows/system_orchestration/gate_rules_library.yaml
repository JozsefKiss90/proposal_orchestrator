        prose_condition: "Dissemination and exploitation logic is defined"

      - predicate_id: g06_p08
        type: schema
        function: json_field_present
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase5_impact_architecture/impact_architecture.json"
          field: "sustainability_mechanism"
        fail_message: >
