# Gate Rules Library
# Horizon Europe Proposal Orchestration System
#
# Approach A side-car rules library — maps each gate_id to executable predicates.
# The manifest (manifest.compile.yaml) is not modified by this file.
# The runner loads this library at evaluation time and resolves predicates
# against the live repository state.
#
# See gate_rules_library_plan.md for the full specification.
# See artifact_schema_specification.yaml for field-level artifact schemas.
#
# ${run_id} in args fields is a runtime parameter injected by the runner at
# evaluate_gate call time. It is not a static value. The runner must substitute
# the current run's UUID before passing args to any predicate function.
#
# Predicate evaluation order within each gate (mandatory per §3 of plan):
#   1. file  2. gate_pass  3. schema  4. source_ref  5. coverage
#   6. cycle  7. timeline  8. semantic
# Semantic predicates are only invoked if all deterministic predicates pass.

library_version: "1.0"
manifest_version: "1.1"
constitution_version: "21430b0"
source_package: ".claude/workflows/system_orchestration/"

gate_rules:

  # ===========================================================================
  # GATE 01 — gate_01_source_integrity
  # Kind: entry  |  Node: n01  |  Phase: 1 — Call Analysis
  # Evaluated before Phase 1 begins execution.
  # Checks that all source documents and call binding data are present before
  # the call_analyzer agent is invoked.
  # ===========================================================================
  - gate_id: gate_01_source_integrity
    gate_kind: entry
    evaluated_at: "n01 entry"
    mandatory: false
    bypass_prohibited: false
    predicates:

      - predicate_id: g01_p01
        type: file
        function: non_empty_json
        args:
          path: "docs/tier3_project_instantiation/call_binding/selected_call.json"
        fail_message: >
          selected_call.json is absent or empty. The target call cannot be
          identified. Populate docs/tier3_project_instantiation/call_binding/selected_call.json
          before starting Phase 1.
        prose_condition: "selected_call.json must be present and non-empty"

      - predicate_id: g01_p02
        type: schema
        function: json_fields_present
        args:
          path: "docs/tier3_project_instantiation/call_binding/selected_call.json"
          fields:
            - call_id
            - topic_code
            - instrument_type
            - work_programme_area
        fail_message: >
          selected_call.json is missing one or more required fields: call_id,
          topic_code, instrument_type, work_programme_area. All four fields must
          be non-null before Phase 1 can begin.
        prose_condition: "Call identifier, topic code, and instrument type must be present"

      - predicate_id: g01_p03
        type: file
        function: dir_non_empty
        args:
          path: "docs/tier2b_topic_and_call_sources/work_programmes/"
        fail_message: >
          No work programme documents found in
          docs/tier2b_topic_and_call_sources/work_programmes/. At least one
          source work programme document must be present for Phase 1 call
          analysis to proceed.
        prose_condition: "At least one work programme document must be present"

      - predicate_id: g01_p04
        type: file
        function: dir_non_empty
        args:
          path: "docs/tier2b_topic_and_call_sources/call_extracts/"
        fail_message: >
          No call extract documents found in
          docs/tier2b_topic_and_call_sources/call_extracts/. A call extract
          matching the selected topic code must be present before Phase 1
          can begin.
        prose_condition: "At least one call extract matching the topic code must be present"

      - predicate_id: g01_p05
        type: file
        function: dir_non_empty
        args:
          path: "docs/tier2a_instrument_schemas/application_forms/"
        fail_message: >
          No application form templates found in
          docs/tier2a_instrument_schemas/application_forms/. An application
          form template for the resolved instrument type must be present.
        prose_condition: "An application form template for the resolved instrument type must be present"

      - predicate_id: g01_p06
        type: file
        function: dir_non_empty
        args:
          path: "docs/tier2a_instrument_schemas/evaluation_forms/"
        fail_message: >
          No evaluation form templates found in
          docs/tier2a_instrument_schemas/evaluation_forms/. An evaluation
          form for the resolved instrument type must be present.
        prose_condition: "An evaluation form for the resolved instrument type must be present"


  # ===========================================================================
  # GATE 02 — phase_01_gate
  # Kind: exit  |  Node: n01  |  Phase: 1 — Call Analysis
  # Evaluated after Phase 1 completes.
  # Confirms all six Tier 2B extracted files are populated, have source refs,
  # the instrument type resolves to a schema, and the phase output is written.
  # ===========================================================================
  - gate_id: phase_01_gate
    gate_kind: exit
    evaluated_at: "n01 exit"
    mandatory: false
    bypass_prohibited: false
    predicates:

      # --- file predicates (Tier 2B extracted files) ---
      - predicate_id: g02_p01
        type: file
        function: non_empty_json
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/call_constraints.json"
        fail_message: >
          call_constraints.json is absent or empty in Tier 2B extracted/.
          Phase 1 must populate all six extracted files from the source work
          programme documents.
        prose_condition: "All six Tier 2B extracted JSON files are non-empty"

      - predicate_id: g02_p02
        type: file
        function: non_empty_json
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/expected_outcomes.json"
        fail_message: >
          expected_outcomes.json is absent or empty in Tier 2B extracted/.
        prose_condition: "All six Tier 2B extracted JSON files are non-empty"

      - predicate_id: g02_p03
        type: file
        function: non_empty_json
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/expected_impacts.json"
        fail_message: >
          expected_impacts.json is absent or empty in Tier 2B extracted/.
        prose_condition: "All six Tier 2B extracted JSON files are non-empty"

      - predicate_id: g02_p04
        type: file
        function: non_empty_json
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/scope_requirements.json"
        fail_message: >
          scope_requirements.json is absent or empty in Tier 2B extracted/.
        prose_condition: "All six Tier 2B extracted JSON files are non-empty"

      - predicate_id: g02_p05
        type: file
        function: non_empty_json
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/eligibility_conditions.json"
        fail_message: >
          eligibility_conditions.json is absent or empty in Tier 2B extracted/.
        prose_condition: "All six Tier 2B extracted JSON files are non-empty"

      - predicate_id: g02_p06
        type: file
        function: non_empty_json
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/evaluation_priority_weights.json"
        fail_message: >
          evaluation_priority_weights.json is absent or empty in Tier 2B extracted/.
        prose_condition: "All six Tier 2B extracted JSON files are non-empty"

      - predicate_id: g02_p14
        type: file
        function: non_empty_json
        args:
          path: "docs/tier2a_instrument_schemas/extracted/section_schema_registry.json"
        fail_message: >
          section_schema_registry.json is absent or empty. The Tier 2A
          section schema registry must be populated for instrument type
          resolution to succeed.
        prose_condition: "Instrument type resolved to a Tier 2A application form and evaluation form"

      - predicate_id: g02_p15
        type: file
        function: non_empty_json
        args:
          path: "docs/tier2a_instrument_schemas/extracted/evaluator_expectation_registry.json"
        fail_message: >
          evaluator_expectation_registry.json is absent or empty. The Tier 2A
          evaluator expectation registry must be populated for Phase 1 to
          complete.
        prose_condition: "Instrument type resolved to a Tier 2A evaluation form"

      - predicate_id: g02_p16
        type: file
        function: non_empty_json
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase1_call_analysis/call_analysis_summary.json"
        fail_message: >
          call_analysis_summary.json is absent or empty in
          docs/tier4_orchestration_state/phase_outputs/phase1_call_analysis/.
          Phase 1 must write its canonical output before this gate can pass.
        prose_condition: "Evaluation matrix and compliance checklist written to Tier 4 phase output"

      - predicate_id: g02_p17
        type: file
        function: artifact_owned_by_run
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase1_call_analysis/call_analysis_summary.json"
          run_id: "${run_id}"
        fail_message: >
          call_analysis_summary.json exists but its run_id field does not match
          the current run. This is a stale artifact from a prior run. Re-run
          Phase 1 under the current run, or add the artifact to the reuse policy.
        prose_condition: "Evaluation matrix and compliance checklist written to Tier 4 phase output"

      # --- schema predicates ---
      - predicate_id: g02_p13
        type: schema
        function: instrument_type_matches_schema
        args:
          call_path: "docs/tier3_project_instantiation/call_binding/selected_call.json"
          schema_path: "docs/tier2a_instrument_schemas/extracted/section_schema_registry.json"
        fail_message: >
          The instrument_type in selected_call.json does not match any entry
          in section_schema_registry.json. Verify the instrument_type value
          and ensure the schema registry is populated for that instrument.
        prose_condition: "Instrument type resolved to a Tier 2A application form and evaluation form"

      # --- source_ref predicates ---
      - predicate_id: g02_p07
        type: source_ref
        function: source_refs_present
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/call_constraints.json"
        fail_message: >
          call_constraints.json contains items without source_section or
          source_document fields. Every extracted constraint must be traceable
          to a named section in the source work programme document.
        prose_condition: "All six Tier 2B extracted JSON files have source section references"

      - predicate_id: g02_p08
        type: source_ref
        function: source_refs_present
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/expected_outcomes.json"
        fail_message: >
          expected_outcomes.json contains items without source_section or
          source_document fields.
        prose_condition: "All six Tier 2B extracted JSON files have source section references"

      - predicate_id: g02_p09
        type: source_ref
        function: source_refs_present
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/expected_impacts.json"
        fail_message: >
          expected_impacts.json contains items without source_section or
          source_document fields.
        prose_condition: "All six Tier 2B extracted JSON files have source section references"

      - predicate_id: g02_p10
        type: source_ref
        function: source_refs_present
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/scope_requirements.json"
        fail_message: >
          scope_requirements.json contains items without source_section or
          source_document fields.
        prose_condition: "All six Tier 2B extracted JSON files have source section references"

      - predicate_id: g02_p11
        type: source_ref
        function: source_refs_present
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/eligibility_conditions.json"
        fail_message: >
          eligibility_conditions.json contains items without source_section or
          source_document fields.
        prose_condition: "All six Tier 2B extracted JSON files have source section references"

      - predicate_id: g02_p12
        type: source_ref
        function: source_refs_present
        args:
          path: "docs/tier2b_topic_and_call_sources/extracted/evaluation_priority_weights.json"
        fail_message: >
          evaluation_priority_weights.json contains items without source_section
          or source_document fields.
        prose_condition: "All six Tier 2B extracted JSON files have source section references"


  # ===========================================================================
  # GATE 03 — phase_02_gate
  # Kind: exit  |  Node: n02  |  Phase: 2 — Concept Refinement
  # Evaluated after Phase 2 completes.
  # Confirms Phase 1 passed, topic mapping is present with source refs,
  # compliance profile is written, phase output is owned by the current run,
  # and no unresolved scope conflicts remain.
  # ===========================================================================
  - gate_id: phase_02_gate
    gate_kind: exit
    evaluated_at: "n02 exit"
    mandatory: false
    bypass_prohibited: false
    predicates:

      # --- gate_pass predicates ---
      - predicate_id: g03_p01
        type: gate_pass
        function: gate_pass_recorded
        args:
          gate_id: "phase_01_gate"
          run_id: "${run_id}"
          tier4_root: "docs/tier4_orchestration_state"
        fail_message: >
          phase_01_gate has not passed for the current run. Phase 2 cannot
          complete until Phase 1 has passed its exit gate. Re-run Phase 1
          or verify the gate result artifact at
          docs/tier4_orchestration_state/phase_outputs/phase1_call_analysis/gate_result.json.
        prose_condition: "Phase 1 gate must have passed"

      # --- file predicates ---
      - predicate_id: g03_p02
        type: file
        function: non_empty_json
        args:
          path: "docs/tier3_project_instantiation/call_binding/topic_mapping.json"
        fail_message: >
          topic_mapping.json is absent or empty. Phase 2 must produce and
          write a topic mapping before this gate can pass.
        prose_condition: "topic_mapping.json is non-empty"

      - predicate_id: g03_p04
        type: file
        function: non_empty_json
        args:
          path: "docs/tier3_project_instantiation/call_binding/compliance_profile.json"
        fail_message: >
          compliance_profile.json is absent or empty. Phase 2 must populate
          the compliance profile in Tier 3 call_binding/ before this gate
          can pass.
        prose_condition: "compliance_profile.json is non-empty"

      - predicate_id: g03_p05
        type: file
        function: non_empty_json
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase2_concept_refinement/concept_refinement_summary.json"
        fail_message: >
          concept_refinement_summary.json is absent or empty in
          docs/tier4_orchestration_state/phase_outputs/phase2_concept_refinement/.
          Phase 2 must write its canonical output before this gate can pass.
        prose_condition: "Phase 2 summary written to Tier 4"

      - predicate_id: g03_p07
        type: file
        function: artifact_owned_by_run
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase2_concept_refinement/concept_refinement_summary.json"
          run_id: "${run_id}"
        fail_message: >
          concept_refinement_summary.json exists but its run_id does not
          match the current run. Re-run Phase 2 or add this artifact to the
          reuse policy.
        prose_condition: "Phase 2 summary written to Tier 4"

      # --- source_ref predicates ---
      - predicate_id: g03_p03
        type: source_ref
        function: all_mappings_have_source_refs
        args:
          path: "docs/tier3_project_instantiation/call_binding/topic_mapping.json"
        fail_message: >
          topic_mapping.json contains mapping entries that are missing
          tier2b_source_ref or tier3_evidence_ref fields. Every mapping
          must carry both a Tier 2B source reference and a Tier 3 project
          evidence reference.
        prose_condition: "All mappings carry source references"

      # --- semantic predicates ---
      - predicate_id: g03_p06
        type: semantic
        function: no_unresolved_scope_conflicts
        args:
          phase2_path: "docs/tier4_orchestration_state/phase_outputs/phase2_concept_refinement/concept_refinement_summary.json"
          scope_path: "docs/tier2b_topic_and_call_sources/extracted/scope_requirements.json"
        fail_message: >
          Unresolved scope conflicts remain between the Phase 2 refined concept
          and Tier 2B scope requirements. All scope conflicts must be resolved
          or logged as explicitly unresolvable before Phase 3 can proceed.
        prose_condition: "No unresolved scope conflicts between concept and Tier 2B"


  # ===========================================================================
  # GATE 04 — phase_03_gate
  # Kind: exit  |  Node: n03  |  Phase: 3 — WP Design and Dependency Mapping
  # Evaluated after Phase 3 completes.
  # Confirms Phase 2 passed, WP structure is written and owned by current run,
  # dependency map is present, all WPs have deliverables and leads, WP count
  # is within instrument limit, dependency graph is acyclic, and all assigned
  # partners exist in Tier 3.
  # ===========================================================================
  - gate_id: phase_03_gate
    gate_kind: exit
    evaluated_at: "n03 exit"
    mandatory: false
    bypass_prohibited: false
    predicates:

      # --- gate_pass predicates ---
      - predicate_id: g04_p01
        type: gate_pass
        function: gate_pass_recorded
        args:
          gate_id: "phase_02_gate"
          run_id: "${run_id}"
          tier4_root: "docs/tier4_orchestration_state"
        fail_message: >
          phase_02_gate has not passed for the current run. Phase 3 cannot
          complete until Phase 2 has passed its exit gate.
        prose_condition: "Phase 2 gate must have passed"

      # --- file predicates ---
      - predicate_id: g04_p02
        type: file
        function: non_empty_json
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/wp_structure.json"
        fail_message: >
          wp_structure.json is absent or empty in
          docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/.
          Phase 3 must write its canonical WP structure artifact before this
          gate can pass.
        prose_condition: "Full WP structure written to Tier 4"

      - predicate_id: g04_p02b
        type: file
        function: artifact_owned_by_run
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/wp_structure.json"
          run_id: "${run_id}"
        fail_message: >
          wp_structure.json exists but its run_id does not match the current
          run. Re-run Phase 3 or add this artifact to the reuse policy.
        prose_condition: "Full WP structure written to Tier 4"

      # --- schema predicates ---
      - predicate_id: g04_p03
        type: schema
        function: json_field_present
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/wp_structure.json"
          field: "dependency_map"
        fail_message: >
          wp_structure.json is missing the dependency_map field. The dependency
          map is a mandatory output of Phase 3 and is required as input to
          Phases 4 and 6.
        prose_condition: "Dependency map written to Tier 4"

      # --- coverage predicates ---
      - predicate_id: g04_p04
        type: coverage
        function: all_wps_have_deliverable_and_lead
        args:
          wp_path: "docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/wp_structure.json"
        fail_message: >
          One or more work packages in wp_structure.json are missing a
          deliverable or a responsible lead partner. Every WP must have at
          least one deliverable and a non-null lead_partner field.
        prose_condition: "All WPs have at least one deliverable and a responsible lead"

      - predicate_id: g04_p07
        type: coverage
        function: all_partners_in_tier3
        args:
          wp_path: "docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/wp_structure.json"
          partners_path: "docs/tier3_project_instantiation/consortium/partners.json"
        fail_message: >
          One or more partners assigned as lead or contributor in wp_structure.json
          do not exist in docs/tier3_project_instantiation/consortium/partners.json.
          All WP-assigned partners must be present in Tier 3 consortium data.
        prose_condition: "All assigned partners present in Tier 3 consortium data"

      # --- cycle predicates ---
      - predicate_id: g04_p06
        type: cycle
        function: no_dependency_cycles
        args:
          wp_path: "docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/wp_structure.json"
        fail_message: >
          A dependency cycle was detected in the dependency_map of
          wp_structure.json. The inter-WP and inter-task dependency graph
          must be a directed acyclic graph (DAG). Resolve the cycle before
          Phase 4 and Phase 6 can proceed.
        prose_condition: "No dependency cycles in the dependency map"

      # --- timeline predicates ---
      - predicate_id: g04_p05
        type: timeline
        function: wp_count_within_limit
        args:
          wp_path: "docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/wp_structure.json"
          schema_path: "docs/tier2a_instrument_schemas/extracted/section_schema_registry.json"
        fail_message: >
          The number of work packages in wp_structure.json exceeds the maximum
          WP count specified in section_schema_registry.json for the active
          instrument type. Reduce the WP count to comply with Tier 2A
          instrument constraints.
        prose_condition: "WP count compliant with Tier 2A instrument constraints"


  # ===========================================================================
  # GATE 05 — phase_04_gate
  # Kind: exit  |  Node: n04  |  Phase: 4 — Gantt and Milestones
  # Evaluated after Phase 4 completes.
  # Confirms Phase 3 passed, Gantt artifact is written and owned by current run,
  # all tasks are assigned to months within project duration, all milestones
  # have verifiable criteria, critical path is present, and milestones_seed
  # has been populated in Tier 3.
  # ===========================================================================
  - gate_id: phase_04_gate
    gate_kind: exit
    evaluated_at: "n04 exit"
    mandatory: false
    bypass_prohibited: false
    predicates:

      # --- gate_pass predicates ---
      - predicate_id: g05_p01
        type: gate_pass
        function: gate_pass_recorded
        args:
          gate_id: "phase_03_gate"
          run_id: "${run_id}"
          tier4_root: "docs/tier4_orchestration_state"
        fail_message: >
          phase_03_gate has not passed for the current run. Phase 4 cannot
          complete until Phase 3 has passed its exit gate.
        prose_condition: "Phase 3 gate must have passed"

      # --- file predicates ---
      - predicate_id: g05_p02
        type: file
        function: non_empty_json
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase4_gantt_milestones/gantt.json"
        fail_message: >
          gantt.json is absent or empty in
          docs/tier4_orchestration_state/phase_outputs/phase4_gantt_milestones/.
          Phase 4 must write its canonical Gantt artifact before this gate
          can pass.
        prose_condition: "Gantt structure and milestone table written to Tier 4"

      - predicate_id: g05_p02b
        type: file
        function: artifact_owned_by_run
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase4_gantt_milestones/gantt.json"
          run_id: "${run_id}"
        fail_message: >
          gantt.json exists but its run_id does not match the current run.
          Re-run Phase 4 or add this artifact to the reuse policy.
        prose_condition: "Gantt structure and milestone table written to Tier 4"

      - predicate_id: g05_p07
        type: file
        function: non_empty_json
        args:
          path: "docs/tier3_project_instantiation/architecture_inputs/milestones_seed.json"
        fail_message: >
          milestones_seed.json is absent or empty in
          docs/tier3_project_instantiation/architecture_inputs/. Phase 4
          must populate milestones_seed.json in Tier 3 before this gate
          can pass.
        prose_condition: "milestones_seed.json populated in Tier 3"

      # --- coverage predicates ---
      - predicate_id: g05_p03
        type: coverage
        function: all_tasks_have_months
        args:
          gantt_path: "docs/tier4_orchestration_state/phase_outputs/phase4_gantt_milestones/gantt.json"
          wp_path: "docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/wp_structure.json"
        fail_message: >
          One or more task_ids present in wp_structure.json are absent from
          gantt.json, or have null start_month or end_month. Every task
          defined in the Phase 3 WP structure must appear in the Gantt with
          non-null month assignments.
        prose_condition: "All tasks assigned to months within project duration"

      # --- timeline predicates ---
      - predicate_id: g05_p04
        type: timeline
        function: timeline_within_duration
        args:
          gantt_path: "docs/tier4_orchestration_state/phase_outputs/phase4_gantt_milestones/gantt.json"
          call_path: "docs/tier3_project_instantiation/call_binding/selected_call.json"
        fail_message: >
          One or more tasks in gantt.json have an end_month that exceeds the
          project_duration_months specified in selected_call.json. The timeline
          must fit within the call-specified project duration.
        prose_condition: "All tasks assigned to months within project duration"

      - predicate_id: g05_p05
        type: timeline
        function: all_milestones_have_criteria
        args:
          gantt_path: "docs/tier4_orchestration_state/phase_outputs/phase4_gantt_milestones/gantt.json"
        fail_message: >
          One or more milestones in gantt.json are missing a due_month or
          verifiable_criterion field. Every milestone must have a concrete,
          non-empty verifiable criterion and a non-null due month.
        prose_condition: "All milestones have verifiable criteria and due months"

      - predicate_id: g05_p06
        type: timeline
        function: critical_path_present
        args:
          gantt_path: "docs/tier4_orchestration_state/phase_outputs/phase4_gantt_milestones/gantt.json"
        fail_message: >
          gantt.json is missing the critical_path field or the field is empty.
          The Phase 4 output must identify the critical path through the project
          schedule.
        prose_condition: "Critical path identified and consistent with dependency map"


  # ===========================================================================
  # GATE 06 — phase_05_gate
  # Kind: exit  |  Node: n05  |  Phase: 5 — Impact Architecture
  # Evaluated after Phase 5 completes.
