  # ===========================================================================
  # GATE 08 — gate_09_budget_consistency
  # Kind: exit  |  Node: n07  |  Phase: 7 — Budget Gate
  # mandatory: true  |  bypass_prohibited: true
  # Evaluated after Phase 7 completes.
  # This is the only mandatory bypass-prohibited gate. A failure of the
  # dir_non_empty check on received/ triggers a HARD_BLOCK that freezes all
  # Phase 8 nodes. See §6.4 of the plan for HARD_BLOCK semantics.
  # No Phase 8 substep may commence until this gate passes.
  # ===========================================================================
  - gate_id: gate_09_budget_consistency
    gate_kind: exit
    evaluated_at: "n07 exit"
    mandatory: true
    bypass_prohibited: true
    hard_block_on_missing_received_dir: true
    predicates:

      # --- gate_pass predicates ---
      - predicate_id: g08_p01
        type: gate_pass
        function: gate_pass_recorded
        args:
          gate_id: "phase_06_gate"
          run_id: "${run_id}"
          tier4_root: "docs/tier4_orchestration_state"
        fail_message: >
          phase_06_gate has not passed for the current run. The budget gate
          cannot be evaluated until Phase 6 has passed its exit gate.
        prose_condition: "Phase 6 gate must have passed"

      # --- file predicates ---
      # NOTE: Failure of g08_p02 triggers HARD_BLOCK per §6.4. The runner
      # must check mandatory and bypass_prohibited before evaluating this gate
      # and must emit a HARD_BLOCK result code on g08_p02 failure in addition
      # to the standard fail status. All downstream Phase 8 nodes are frozen.
      - predicate_id: g08_p02
        type: file
        function: dir_non_empty
        args:
          path: "docs/integrations/lump_sum_budget_planner/received/"
        fail_message: >
          No budget response artifacts found in
          docs/integrations/lump_sum_budget_planner/received/. A validated
          external budget response is mandatory. Absent budget artifacts
          are a HARD BLOCK: all Phase 8 nodes are frozen until this gate
          passes. This gate is mandatory and bypass-prohibited per CLAUDE.md
          §8.4 and §13.4.
        prose_condition: "Non-empty budget response artifact present in integrations/received/"

      - predicate_id: g08_p03
        type: file
        function: dir_non_empty
        args:
          path: "docs/integrations/lump_sum_budget_planner/validation/"
        fail_message: >
          No validation artifacts found in
          docs/integrations/lump_sum_budget_planner/validation/. A
          validation artifact confirming interface contract conformance
          must be present alongside the budget response.
        prose_condition: "Validation artifact present in integrations/validation/"

      - predicate_id: g08_p08
        type: file
        function: non_empty_json
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase7_budget_gate/budget_gate_assessment.json"
        fail_message: >
          budget_gate_assessment.json is absent or empty in
          docs/tier4_orchestration_state/phase_outputs/phase7_budget_gate/.
          Phase 7 must write its canonical assessment artifact before this
          gate can pass.
        prose_condition: "Budget gate assessment written to Tier 4"

      - predicate_id: g08_p09
        type: file
        function: artifact_owned_by_run
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase7_budget_gate/budget_gate_assessment.json"
          run_id: "${run_id}"
        fail_message: >
          budget_gate_assessment.json exists but its run_id does not match
          the current run. Re-run Phase 7 or add this artifact to the
          reuse policy.
        prose_condition: "Budget gate assessment written to Tier 4"

      # --- schema predicates ---
      - predicate_id: g08_p04
        type: schema
        function: interface_contract_conforms
        args:
          response_path: "docs/integrations/lump_sum_budget_planner/received/"
          contract_path: "docs/integrations/lump_sum_budget_planner/interface_contract.json"
        fail_message: >
          One or more files in integrations/received/ do not conform to the
          interface contract at interface_contract.json. Non-conforming budget
          responses must be rejected and flagged; they cannot be used as the
          basis for budget gate passage.
        prose_condition: "Interface contract conformance confirmed"

      - predicate_id: g08_p07
        type: schema
        function: no_blocking_inconsistencies
        args:
          path: "docs/tier4_orchestration_state/phase_outputs/phase7_budget_gate/budget_gate_assessment.json"
        fail_message: >
          budget_gate_assessment.json contains one or more blocking_inconsistencies
          entries with resolution: unresolved. All blocking structural
          inconsistencies between the budget response and the WP/consortium
          design must be resolved before this gate can pass.
        prose_condition: "No blocking inconsistency logged without resolution"

      # --- coverage predicates ---
      - predicate_id: g08_p05
        type: coverage
        function: wp_budget_coverage_match
        args:
          wp_path: "docs/tier4_orchestration_state/phase_outputs/phase3_wp_design/wp_structure.json"
          budget_path: "docs/integrations/lump_sum_budget_planner/received/"
        fail_message: >
          One or more WP identifiers from wp_structure.json are absent from
          the budget response in integrations/received/. Every Phase 3 WP
          must have a corresponding budget entry in the external budget response.
        prose_condition: "All Phase 3 WPs have corresponding budget entries"

      - predicate_id: g08_p06
        type: coverage
        function: partner_budget_coverage_match
        args:
          partners_path: "docs/tier3_project_instantiation/consortium/partners.json"
          budget_path: "docs/integrations/lump_sum_budget_planner/received/"
        fail_message: >
          One or more consortium partners in Tier 3 partners.json do not have
          a corresponding effort or cost allocation in the budget response.
          Every partner must have a budget allocation.
        prose_condition: "All consortium partners have corresponding budget allocations"


